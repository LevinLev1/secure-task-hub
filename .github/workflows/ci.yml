name: ci

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  verify-and-fs-security:
    name: "Stage 1 — build, test, filesystem security"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Maven verify (unit + integration tests)
        run: mvn -B clean verify

      - name: Trivy — secret scan (repository)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: secret
          severity: HIGH,CRITICAL
          exit-code: "1"

      - name: Trivy — vulnerability scan (filesystem / dependencies)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          severity: HIGH,CRITICAL
          exit-code: "1"

      - name: Trivy — misconfiguration (filesystem)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: misconfig
          severity: HIGH,CRITICAL
          exit-code: "1"

  images-k8s-and-grype:
    name: "Stage 2 — images, Kubernetes manifests, Grype"
    runs-on: ubuntu-latest
    needs: verify-and-fs-security
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build auth image
        run: docker build -f services/auth-service/Dockerfile -t secure-task-hub-auth:ci .

      - name: Build task image
        run: docker build -f services/task-service/Dockerfile -t secure-task-hub-task:ci .

      - name: Trivy — auth image
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: secure-task-hub-auth:ci
          format: table
          severity: HIGH,CRITICAL
          exit-code: "1"

      - name: Trivy — task image
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: secure-task-hub-task:ci
          format: table
          severity: HIGH,CRITICAL
          exit-code: "1"

      - name: Trivy — Kubernetes manifests
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: config
          scan-ref: infra/k8s
          severity: HIGH,CRITICAL
          exit-code: "1"

      - name: Install Grype
        uses: anchore/scan-action/download-grype@v4

      - name: Grype — auth image
        run: grype secure-task-hub-auth:ci --fail-on high

      - name: Grype — task image
        run: grype secure-task-hub-task:ci --fail-on high
