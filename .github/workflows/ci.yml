name: ci

on:
  push:
    branches: ["main", "master", "feature/**"]
  pull_request:

# GitHub is moving Actions off Node 20; opt into Node 24 for JS-based actions.
# See: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify-and-fs-security:
    name: "Stage 1 — build/test + Secret Detection + Source SCA"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Maven verify (unit + integration tests)
        run: mvn -B clean verify

      # Demo defaults in YAML/Compose trigger secret rules; skip those paths (use env/secrets in real deploy).
      - name: Trivy — Secret Detection (source)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: secret
          severity: HIGH,CRITICAL
          exit-code: "1"
          skip-files: "services/auth-service/src/main/resources/application.yml,services/task-service/src/main/resources/application.yml,infra/docker-compose.yml,services/task-service/src/test/resources/application-integrationtest.yml"

      - name: Trivy — Source SCA (dependencies)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          severity: HIGH,CRITICAL
          exit-code: "1"

      - name: Trivy — misconfiguration (infra only)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: infra
          scanners: misconfig
          severity: HIGH,CRITICAL
          exit-code: "1"

  semgrep-sast:
    name: "Stage 1b — SAST (Semgrep)"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      # Pip-installed semgrep on GHA has repeatedly broken on pkg_resources/setuptools; use official image.
      - name: Semgrep scan (Docker)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/src" \
            --workdir /src \
            semgrep/semgrep:latest \
            semgrep scan --config p/java --config p/security-audit --error services

  checkov-k8s:
    name: "Stage 1c — IaC policy (Checkov/K8s)"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Checkov
        run: pip install "checkov~=3.2.56"

      # Demo baseline skips (see .checkov.yaml); repeat flags — comma form is not reliable across Checkov minors.
      - name: Checkov scan
        run: |
          checkov -d infra/k8s --framework kubernetes --compact \
            --skip-check CKV_K8S_14 \
            --skip-check CKV_K8S_15 \
            --skip-check CKV_K8S_35 \
            --skip-check CKV_K8S_38 \
            --skip-check CKV_K8S_40 \
            --skip-check CKV_K8S_43

  images-k8s-and-grype:
    name: "Stage 2 — Binary SCA (images) + K8s config"
    runs-on: ubuntu-latest
    needs:
      - verify-and-fs-security
      - semgrep-sast
      - checkov-k8s
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build auth image
        run: docker build -f services/auth-service/Dockerfile -t secure-task-hub-auth:ci .

      - name: Build task image
        run: docker build -f services/task-service/Dockerfile -t secure-task-hub-task:ci .

      - name: Trivy — Binary SCA (auth image)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: secure-task-hub-auth:ci
          format: table
          severity: HIGH,CRITICAL
          exit-code: "1"

      - name: Trivy — Binary SCA (task image)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: secure-task-hub-task:ci
          format: table
          severity: HIGH,CRITICAL
          exit-code: "1"

      - name: Trivy — Kubernetes manifests
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: config
          scan-ref: infra/k8s
          severity: HIGH,CRITICAL
          exit-code: "1"

      - name: Install Grype
        uses: anchore/scan-action/download-grype@v7.4.0
        id: grype

      # download-grype exposes outputs.cmd (absolute path); it does not add `grype` to PATH for run: steps.
      - name: Grype — Binary SCA (auth image)
        run: ${{ steps.grype.outputs.cmd }} secure-task-hub-auth:ci --fail-on high

      - name: Grype — Binary SCA (task image)
        run: ${{ steps.grype.outputs.cmd }} secure-task-hub-task:ci --fail-on high
