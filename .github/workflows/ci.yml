name: ci

on:
  push:
    branches: ["main", "master"]
  pull_request:

# GitHub is moving Actions off Node 20; opt into Node 24 for JS-based actions.
# See: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify-and-fs-security:
    name: "Stage 1 — build, test, filesystem security"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Maven verify (unit + integration tests)
        run: mvn -B clean verify

      # Demo defaults in YAML/Compose trigger secret rules; skip those paths (use env/secrets in real deploy).
      - name: Trivy — secret scan (repository)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: secret
          severity: HIGH,CRITICAL
          exit-code: "1"
          skip-files: "services/auth-service/src/main/resources/application.yml,services/task-service/src/main/resources/application.yml,infra/docker-compose.yml,services/task-service/src/test/resources/application-integrationtest.yml"

      - name: Trivy — vulnerability scan (filesystem / dependencies)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          severity: HIGH,CRITICAL
          exit-code: "1"

      - name: Trivy — misconfiguration (infra only)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: infra
          scanners: misconfig
          severity: HIGH,CRITICAL
          exit-code: "1"

  semgrep-sast:
    name: "Stage 1b — Semgrep (Java)"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Semgrep
        run: pip install "semgrep~=1.99.0"

      - name: Semgrep scan
        run: semgrep scan --config p/java --config p/security-audit --error services

  checkov-k8s:
    name: "Stage 1c — Checkov (Kubernetes)"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Checkov
        run: pip install "checkov~=3.2.56"

      # Severity filters often need Prisma/BC API; keep default local evaluation (second opinion vs Trivy config).
      - name: Checkov scan
        run: checkov -d infra/k8s --framework kubernetes --compact

  images-k8s-and-grype:
    name: "Stage 2 — images, Kubernetes manifests, Grype"
    runs-on: ubuntu-latest
    needs:
      - verify-and-fs-security
      - semgrep-sast
      - checkov-k8s
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build auth image
        run: docker build -f services/auth-service/Dockerfile -t secure-task-hub-auth:ci .

      - name: Build task image
        run: docker build -f services/task-service/Dockerfile -t secure-task-hub-task:ci .

      - name: Trivy — auth image
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: secure-task-hub-auth:ci
          format: table
          severity: HIGH,CRITICAL
          exit-code: "1"

      - name: Trivy — task image
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: secure-task-hub-task:ci
          format: table
          severity: HIGH,CRITICAL
          exit-code: "1"

      - name: Trivy — Kubernetes manifests
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: config
          scan-ref: infra/k8s
          severity: HIGH,CRITICAL
          exit-code: "1"

      - name: Install Grype
        uses: anchore/scan-action/download-grype@v7.4.0
        id: grype

      # download-grype exposes outputs.cmd (absolute path); it does not add `grype` to PATH for run: steps.
      - name: Grype — auth image
        run: ${{ steps.grype.outputs.cmd }} secure-task-hub-auth:ci --fail-on high

      - name: Grype — task image
        run: ${{ steps.grype.outputs.cmd }} secure-task-hub-task:ci --fail-on high
