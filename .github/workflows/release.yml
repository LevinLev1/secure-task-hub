# Builds versioned images when you push a SemVer tag: v0.1.0, v0.2.1, ...
# Does not push to a registry unless you add docker/login + push steps.
name: release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify-and-images:
    name: "Release — verify + Docker images"
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Maven verify
        run: mvn -B clean verify

      - name: Derive version from tag
        id: meta
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VER="${TAG#v}"
          echo "version=${VER}" >> "$GITHUB_OUTPUT"
          echo "Building images for tag ${TAG} (version ${VER})"

      - name: Build auth image
        run: docker build -f services/auth-service/Dockerfile -t "secure-task-hub-auth:${{ steps.meta.outputs.version }}" -t secure-task-hub-auth:release .

      - name: Build task image
        run: docker build -f services/task-service/Dockerfile -t "secure-task-hub-task:${{ steps.meta.outputs.version }}" -t secure-task-hub-task:release .

      - name: Image list (summary)
        run: docker images --format "table {{.Repository}}\t{{.Tag}}\t{{.Size}}" | grep -E 'secure-task-hub|REPOSITORY' || true
