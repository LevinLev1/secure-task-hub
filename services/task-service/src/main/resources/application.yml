server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: task-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/securetaskhub}
    username: ${SPRING_DATASOURCE_USERNAME:securetaskhub}
    password: ${SPRING_DATASOURCE_PASSWORD:changeme}
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
  jackson:
    default-property-inclusion: non_null

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

app:
  api-docs:
    version: 0.1.0

security:
  jwt:
    secret: ${JWT_SECRET:replace-this-with-a-long-development-secret-key-123456}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    root: INFO
    org.springframework.security: INFO
