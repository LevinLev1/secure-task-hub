# Local kind: rewrites app images to :local (loaded via `kind load docker-image`).
# Must live under infra/k8s/ so `resources: base/...` stays inside the kustomize root (no `..`).
# Apply: kubectl apply -k infra/k8s
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - base/secure-task-hub.yaml
images:
  - name: ghcr.io/your-user/secure-task-hub-auth
    newName: secure-task-hub-auth
    newTag: local
  - name: ghcr.io/your-user/secure-task-hub-task
    newName: secure-task-hub-task
    newTag: local
