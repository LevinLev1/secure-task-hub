services:
  postgres:
    image: postgres:16-alpine
    container_name: securetaskhub-postgres
    environment:
      POSTGRES_DB: securetaskhub
      POSTGRES_USER: securetaskhub
      POSTGRES_PASSWORD: securetaskhub-dev-password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U securetaskhub -d securetaskhub"]
      interval: 10s
      timeout: 5s
      retries: 10

  auth-service:
    build:
      context: ..
      dockerfile: services/auth-service/Dockerfile
    container_name: auth-service
    environment:
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/securetaskhub
      SPRING_DATASOURCE_USERNAME: securetaskhub
      SPRING_DATASOURCE_PASSWORD: securetaskhub-dev-password
      JWT_SECRET: replace-this-with-a-long-development-secret-key-123456
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy

  task-service:
    build:
      context: ..
      dockerfile: services/task-service/Dockerfile
    container_name: task-service
    environment:
      SERVER_PORT: 8082
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/securetaskhub
      SPRING_DATASOURCE_USERNAME: securetaskhub
      SPRING_DATASOURCE_PASSWORD: securetaskhub-dev-password
      JWT_SECRET: replace-this-with-a-long-development-secret-key-123456
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
