# Checkov baseline for this pet project. Trivy still scans infra/kubernetes with fail on HIGH/CRITICAL.
# Skipped rules are either demo-specific (placeholder :latest, env secrets) or overlap strict “prod-only”
# expectations; tighten when publishing real images (digest pins, secret volumes, automountServiceAccountToken).
skip-check:
  - CKV_K8S_14 # image tag :latest / placeholders in base manifest (kind overlay uses concrete tags)
  - CKV_K8S_15 # imagePullPolicy IfNotPresent acceptable for demo
  - CKV_K8S_35 # secrets via env in demo; use volume mounts in production
  - CKV_K8S_38 # default service account token (can set automountServiceAccountToken: false later)
  - CKV_K8S_40 # postgres official image UID (policy wants “high UID”)
  - CKV_K8S_43 # digest-pinned images belong in release pipeline, not GHCR placeholders in base YAML
